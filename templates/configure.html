<!DOCTYPE html>
<html>
<head>
    <title>Configure ASCII Video</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
        }
        h1 {
            text-align: center;
            color: #ffffff;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
        }
        label {
            color: #e0e0e0;
            margin-top: 5px;
        }
        input {
            padding: 8px;
            font-size: 16px;
            background-color: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
        }
        button {
            padding: 10px;
            background-color: #333;
            color: #e0e0e0;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }
        button:hover {
            background-color: #444;
        }
        .metadata {
            margin: 20px 0;
            padding: 15px;
            background-color: #2d2d2d;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Configure ASCII Video</h1>
    <div class="metadata">
        <p>Video Resolution: {{ resolution }}</p>
        <p>Total Frames: {{ frame_count }}</p>
        <p>FPS: {{ fps }}</p>
    </div>
    <form action="/process" method="post">
        <input type="hidden" name="video_id" value="{{ video_id }}">
        <label for="textscale">Textscale (default 80):</label>
        <input type="number" id="textscale" name="textscale" value="80" min="1">
        <label for="framesper">FramesPer batch (default 50):</label>
        <input type="number" id="framesper" name="framesper" value="50" min="1">
        <button type="submit">Process Video</button>
    </form>
</body>
</html>
