<!DOCTYPE html>
<html>
<head>
    <title>Download Success</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
        }
        h1 {
            text-align: center;
            color: #ffffff;
        }
        .container {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: #333;
            color: #e0e0e0;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
            display: block;
            margin: 20px auto;
        }
        button:hover {
            background-color: #444;
        }
        .video-container {
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            max-width: 100%;
            margin: 0 auto 20px auto;
        }
        .video-container video {
            max-width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Processing Complete!</h1>
        <p>Your ASCII video is ready for download.</p>
        <div class="video-container">
            <video controls autoplay loop muted>
                <source src="/download/{{ filename }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <a href="/download/{{ filename }}" download>
            <button>Download Video</button>
        </a>
    </div>
</body>
</html>
